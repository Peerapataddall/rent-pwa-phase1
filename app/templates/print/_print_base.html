<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title or "พิมพ์เอกสาร" }}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --ink:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
    }
    html,body{ font-family:"Prompt",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--ink); }
    body{ background:#f3f4f6; }

    /* A4 sheet */
    .sheet-wrap{ padding: 24px 12px 60px; }
    .sheet{
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
      padding: 18mm 16mm;
    }

    .doc-title{ font-size: 20px; font-weight: 700; letter-spacing: .2px; }
    .doc-meta{ color: var(--muted); font-size: 13px; }
    .kv{ margin:0; }
    .kv dt{ color: var(--muted); font-weight: 600; }
    .kv dd{ margin-bottom: 8px; }

    .hr-soft{ border-top: 1px solid var(--line); margin: 14px 0; }

    .table thead th{
      background:#f9fafb;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
      color:#111827;
      font-size: 13px;
    }
    .table td{ font-size: 13px; vertical-align: top; }
    .totals{
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      background: #fcfcfd;
    }
    .totals .label{ color: var(--muted); font-size: 12px; }
    .totals .value{ font-weight: 800; font-size: 18px; }

    .toolbar{
      width: 210mm;
      margin: 0 auto 10px;
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
    }

    /* Print rules */
    @page { size: A4; margin: 12mm; }
    @media print{
      body{ background:#fff; }
      .sheet-wrap{ padding: 0; }
      .toolbar{ display:none !important; }
      .sheet{
        width: auto;
        min-height: auto;
        margin: 0;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
      }
      a[href]:after{ content: ""; }
    }
  </style>
</head>

<body>
  <div class="sheet-wrap">
    <div class="toolbar">
      <div class="small text-secondary">
        <i class="bi bi-info-circle me-1"></i>แนะนำ: กด <span class="fw-semibold">Ctrl+P</span> เพื่อพิมพ์ / บันทึกเป็น PDF
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-primary" onclick="window.print()">
          <i class="bi bi-printer me-1"></i>พิมพ์
        </button>
        <button class="btn btn-outline-secondary" onclick="window.close()">
          <i class="bi bi-x-lg me-1"></i>ปิด
        </button>
      </div>
    </div>

    <div class="sheet">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
